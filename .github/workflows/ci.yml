name: SecureCare CI Pipeline

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  # ─── Backend: Lint & Test ───────────────────────────────────────
  backend:
    name: Backend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run unit tests
        run: npm test
        env:
          NODE_ENV: test
          JWT_SECRET: ci-test-secret-key-for-testing-only
          ENCRYPTION_KEY: 6465766c6f706d656e742d7365637265742d6b65792d33322d63686172732d21

  # ─── Frontend: Lint & Build ─────────────────────────────────────
  frontend:
    name: Frontend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build production bundle
        run: npm run build

  # ─── Docker: Verify images build ───────────────────────────────
  docker-build:
    name: Docker Build & Security Scan
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build backend Docker image
        run: docker build -t securecare-backend:ci ./backend

      - name: Build frontend Docker image
        run: docker build -t securecare-frontend:ci ./frontend

      # ── Trivy: Scan Docker images for vulnerabilities ────────────
      - name: Install Trivy
        run: |
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Scan backend image
        run: trivy image --severity HIGH,CRITICAL --exit-code 0 --format table securecare-backend:ci

      - name: Scan frontend image
        run: trivy image --severity HIGH,CRITICAL --exit-code 0 --format table securecare-frontend:ci
